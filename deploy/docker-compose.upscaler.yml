services:
  upscaler:
    build:
      context: ..
      dockerfile: upscaler/Dockerfile
    image: ${UPSCALER_IMAGE:-chaincloud-image-upscaler}:${UPSCALER_TAG:-local}
    container_name: ${UPSCALER_CONTAINER_NAME:-chaincloud-image-upscaler}
    environment:
      UPSCALER_PORT: ${UPSCALER_PORT:-8790}
      UPSCALER_WORK_DIR: ${UPSCALER_WORK_DIR:-/data/jobs}
      UPSCALER_WORKERS: ${UPSCALER_WORKERS:-1}
      UPSCALER_ENGINE: ${UPSCALER_ENGINE:-resize}
      UPSCALER_COMMAND: ${UPSCALER_COMMAND:-}
      UPSCALER_ALLOW_RESIZE_FALLBACK: ${UPSCALER_ALLOW_RESIZE_FALLBACK:-true}
      UPSCALER_JOB_TTL_SECONDS: ${UPSCALER_JOB_TTL_SECONDS:-3600}
      UPSCALER_JOB_TIMEOUT_SECONDS: ${UPSCALER_JOB_TIMEOUT_SECONDS:-3600}
      UPSCALER_TOKEN: ${UPSCALER_TOKEN:-}
    ports:
      - "${UPSCALER_HTTP_PORT:-8790}:8790"
    volumes:
      - upscaler-data:/data
    restart: unless-stopped

volumes:
  upscaler-data:
